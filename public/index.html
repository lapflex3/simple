<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razif - Interactive App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 2px solid #667eea;
            color: #333;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result strong {
            color: #667eea;
        }

        .info-box {
            background: #e3f2fd;
            border: 2px solid #2196F3;
            border-radius: 8px;
            padding: 15px;
            color: #1976D2;
            margin-top: 15px;
        }

        .calculator-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .time-display {
            background: white;
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.2em;
            margin-top: 15px;
        }

        .time-display .time {
            color: #667eea;
            font-weight: bold;
            font-size: 2em;
        }

        .time-display .date {
            color: #666;
            font-size: 0.95em;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍💻 Razif</h1>
        <p class="subtitle">Interactive Node.js Web Application</p>

        <!-- Greeting Section -->
        <div class="section">
            <h2>🎯 Ucapan Selamat Datang</h2>
            <div class="form-group">
                <label for="nameInput">Nama Anda:</label>
                <input type="text" id="nameInput" placeholder="Masukkan nama anda...">
            </div>
            <button onclick="getGreeting()">Dapatkan Ucapan</button>
            <div class="result" id="greetingResult"></div>
        </div>

        <!-- Calculator Section -->
        <div class="section">
            <h2>🧮 Kalkulator Interaktif</h2>
            <div class="calculator-inputs">
                <input type="number" id="num1" placeholder="Nombor 1" value="10">
                <input type="number" id="num2" placeholder="Nombor 2" value="5">
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <select id="operation">
                    <option value="add">➕ Tambah</option>
                    <option value="subtract">➖ Tolak</option>
                    <option value="multiply">✖️ Darab</option>
                    <option value="divide">➗ Bahagi</option>
                </select>
            </div>
            <button onclick="calculate()">Kira</button>
            <div class="result" id="calcResult"></div>
        </div>

        <!-- Time Section -->
        <div class="section">
            <h2>🕐 Waktu Semasa</h2>
            <button onclick="getTime()">Tunjukkan Waktu</button>
            <div class="time-display" id="timeResult" style="display: none;">
                <div class="time" id="timeValue"></div>
                <div class="date" id="dateValue"></div>
            </div>
        </div>

        <div class="info-box">
            ℹ️ Ini adalah aplikasi interaktif yang dibina menggunakan Node.js dan Express.
        </div>

        <div class="footer">
            <p>Razif Interactive App © 2026</p>
            <p>Deployed at: <strong>https://aiapp.nasadef.com.my</strong></p>
        </div>
    </div>

    <script>
        async function getGreeting() {
            const name = document.getElementById('nameInput').value || 'Razif';
            try {
                const response = await fetch(`/api/greeting?name=${encodeURIComponent(name)}`);
                const data = await response.json();
                const resultDiv = document.getElementById('greetingResult');
                resultDiv.innerHTML = `<strong>📨 Mesej:</strong> ${data.message}`;
                resultDiv.classList.add('show');
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal mendapatkan ucapan!');
            }
        }

        async function calculate() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const operation = document.getElementById('operation').value;

            try {
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ num1, num2, operation })
                });
                const data = await response.json();
                const resultDiv = document.getElementById('calcResult');
                resultDiv.innerHTML = `<strong>Hasil:</strong> ${num1} ${getOperationSymbol(operation)} ${num2} = <strong style="color: #764ba2; font-size: 1.2em;">${data.result}</strong>`;
                resultDiv.classList.add('show');
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal mengira!');
            }
        }

        async function getTime() {
            try {
                const response = await fetch('/api/time');
                const data = await response.json();
                document.getElementById('timeValue').textContent = data.time;
                document.getElementById('dateValue').textContent = data.date;
                document.getElementById('timeResult').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal mendapatkan waktu!');
            }
        }

        function getOperationSymbol(op) {
            const symbols = {
                'add': '➕',
                'subtract': '➖',
                'multiply': '✖️',
                'divide': '➗'
            };
            return symbols[op] || op;
        }

        // Auto-refresh time every second
        setInterval(() => {
            if (document.getElementById('timeResult').style.display !== 'none') {
                getTime();
            }
        }, 1000);
    </script>
</body>
</html>
